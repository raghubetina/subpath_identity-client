name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }} (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Current toolchain: full default task (tests + standard),
          # resolved from the committed Gemfile.lock.
          - ruby: "4.0.1"
            gemfile: Gemfile
            name: current
            task: rake
          # The declared floor (gemspec: Rails >= 7.0 / Ruby >= 3.2):
          # tests only, resolved fresh from gemfiles/rails_7.gemfile so
          # the advertised minimum keeps actually working, not just
          # parsing.
          - ruby: "3.2"
            gemfile: gemfiles/rails_7.gemfile
            name: rails-7.0-floor
            task: rake test
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/${{ matrix.gemfile }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run the task
        run: bundle exec ${{ matrix.task }}
